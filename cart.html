
<!DOCTYPE html>

<body>

    <a href="index.html" class="logo">F-square</a>
    <div class="nav__search">
      <input type="text" id="navSearchInput" placeholder="Search styles or materials" aria-label="Search styles">
      <button aria-label="Search" id="navSearchBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </div>
    <nav class="nav__links">
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="about.html">About us</a>
    </nav>
    <div class="nav__icons">
      <button aria-label="Wishlist"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.8 1-1a5.5 5.5 0 0 0 0-7.6z"/></svg></button>

      <a href="cart.html" aria-label="Cart" class="is-active">

        <span class="nav__cart-count" data-cart-count>0</span>
      </a>
    </div>
  </div>
</header>

<main>
  <div class="page-header">
    <span class="eyebrow">Your cart</span>
    <h1>Review your order</h1>

  <div class="cart-layout" id="cartLayout">
    <!-- Content injected by cart.js -->

  <a class="whatsapp-float" href="https://wa.me/2348000000000?text=Hi%20F-square%2C%20I%27d%20like%20to%20ask%20about%20your%20fabrics" target="_blank" rel="noopener" aria-label="Chat with us on WhatsApp">
        <span class="whatsapp-float__ping"></span>
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 14.4c-.3-.1-1.7-.9-2-1-.3-.1-.5-.1-.7.1-.2.3-.8 1-.9 1.1-.2.2-.3.2-.6.1-.3-.1-1.2-.5-2.3-1.5-.9-.8-1.4-1.7-1.6-2-.2-.3 0-.5.1-.6.1-.1.3-.3.4-.5.1-.1.2-.3.3-.5.1-.2 0-.4 0-.5C10 9.8 9.5 8.5 9.3 8c-.2-.5-.4-.4-.6-.4h-.5c-.2 0-.5.1-.7.3-.3.3-1 1-1 2.4s1 2.8 1.2 3c.1.2 2 3 4.8 4.3.7.3 1.2.5 1.6.6.7.2 1.3.2 1.8.1.5-.1 1.7-.7 1.9-1.4.2-.7.2-1.2.2-1.4-.1-.1-.3-.2-.6-.3z"/><path d="M12 2a10 10 0 0 0-8.6 15L2 22l5.2-1.4A10 10 0 1 0 12 2zm0 18.2a8.2 8.2 0 0 1-4.2-1.1l-.3-.2-3.1.8.8-3-.2-.3A8.2 8.2 0 1 1 12 20.2z"/></svg>
      </a>  
  <section class="fashion-orbit-section">
    <div class="track-heading">
      <span class="eyebrow">Fashion showcase</span>
      <h2>Designs orbiting your next order</h2>
    </div>
    <div id="fashionOrbit"><!-- Content injected by cart.js --></div>
  </section>
</main>

<script src="products.js"></script>
<script src="cart.js"></script>
<script src="search.js"></script>

<script>
  // This logic runs as soon as the script is reached, 
  // ignoring whether images are broken or still loading.
  (function() {
    const preloader = document.getElementById('preloader');
    
    if (preloader) {
      // 1. Force a fade after 1 second no matter what
      setTimeout(() => {
        preloader.style.transition = "opacity 0.6s ease";
        preloader.style.opacity = "0";
        
        // 2. Remove it from view so you can click buttons
        setTimeout(() => {
          preloader.style.display = "none";
          preloader.style.visibility = "hidden";
        }, 600);
      }, 1000); 
    }
  })();
</script>
</body>
</html>
